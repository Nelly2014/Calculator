<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Varsity Scientific Calculator</title>

<style>
  body {
    margin: 0;
    background: #0b1320;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  .calculator {
    width: 360px;
    background: #111827;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }

  .display {
    background: #000;
    color: #0f0;
    font-size: 1.8em;
    padding: 15px;
    border-radius: 12px;
    text-align: right;
    min-height: 60px;
    overflow-x: auto;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 15px;
  }

  button {
    padding: 14px;
    font-size: 1em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #1f2937;
    color: white;
    transition: 0.2s;
  }

  button:hover {
    background: #374151;
  }

  .op {
    background: #f59e0b;
    color: black;
  }

  .op:hover {
    background: #d97706;
  }

  .eq {
    background: #10b981;
    grid-column: span 2;
  }

  .eq:hover {
    background: #059669;
  }

  .clear {
    background: #ef4444;
  }

  .clear:hover {
    background: #dc2626;
  }

  .func {
    background: #2563eb;
  }

  .func:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

<div class="calculator">

  <div id="display" class="display">0</div>

  <div class="buttons">

    <!-- Scientific Functions -->
    <button class="func" onclick="add('Math.sin(')">sin</button>
    <button class="func" onclick="add('Math.cos(')">cos</button>
    <button class="func" onclick="add('Math.tan(')">tan</button>
    <button class="func" onclick="add('Math.sqrt(')">√</button>
    <button class="clear" onclick="clearAll()">C</button>

    <button class="func" onclick="add('Math.log10(')">log</button>
    <button class="func" onclick="add('Math.log(')">ln</button>
    <button onclick="add('Math.PI')">π</button>
    <button onclick="add('Math.E')">e</button>
    <button onclick="backspace()">⌫</button>

    <!-- Numbers + operators -->
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="op" onclick="add('/')">÷</button>
    <button class="func" onclick="add('**')">xʸ</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="op" onclick="add('*')">×</button>
    <button onclick="add('(')">(</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button class="op" onclick="add('-')">−</button>
    <button onclick="add(')')">)</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button class="op" onclick="add('+')">+</button>
    <button class="eq" onclick="calculate()">=</button>

  </div>
</div>

<script>
let display = document.getElementById("display");
let expression = "";

function add(value) {
  expression += value;
  display.innerText = expression;
}

function clearAll() {
  expression = "";
  display.innerText = "0";
}

function backspace() {
  expression = expression.slice(0, -1);
  display.innerText = expression || "0";
}

function calculate() {
  try {
    let result = eval(expression);
    display.innerText = result;
    expression = result.toString();
  } catch {
    display.innerText = "Error";
    expression = "";
  }
}
</script>

</body>
</html>
