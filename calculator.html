<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stylish Calculator</title>
  <style>
    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #ffffff;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 300px;
    }

    .display {
      background: #222;
      color: #fff;
      font-size: 2em;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #f1f1f1;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #ddd;
    }

    .operator {
      background-color: #ff9f43;
      color: #fff;
    }

    .operator:hover {
      background-color: #e07b19;
    }

    .equal {
      background-color: #28c76f;
      color: white;
    }

    .equal:hover {
      background-color: #1f9f56;
    }

    .clear {
      background-color: #ea5455;
      color: white;
    }

    .clear:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div id="display" class="display">0</div>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="append('.')">.</button>
      <button onclick="append('0')">0</button>
      <button class="operator" onclick="setOperation('/')">÷</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="setOperation('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="setOperation('-')">−</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="setOperation('+')">+</button>

      <button class="equal" style="grid-column: span 4;" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '';
    let operator = '';
    let previous = '';

    function append(number) {
      if (current.length < 12) {
        current += number;
        updateDisplay(current);
      }
    }

    function setOperation(op) {
      if (current === '') return;
      operator = op;
      previous = current;
      current = '';
    }

    function clearDisplay() {
      current = '';
      previous = '';
      operator = '';
      updateDisplay('0');
    }

    function calculate() {
      if (current === '' || previous === '' || operator === '') return;
      const num1 = parseFloat(previous);
      const num2 = parseFloat(current);
      let result = 0;

      switch (operator) {
        case '+': result = num1 + num2; break;
        case '-': result = num1 - num2; break;
        case '*': result = num1 * num2; break;
        case '/': result = num2 === 0 ? 'Error' : num1 / num2; break;
      }

      current = result.toString();
      operator = '';
      previous = '';
      updateDisplay(current);
    }

    function updateDisplay(value) {
      document.getElementById('display').textContent = value;
    }
  </script>
</body>
</html>
